server {
    listen 80;

    # Документация API
    location /api/docs/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/redoc.html;
    }

    # API и Админка — отправляем на бэкенд
    # Убираем лишние слэши в конце proxy_pass для корректной передачи путей
    location /api/ {
        proxy_set_header Host $host;
        proxy_pass http://backend:8000;
    }

    location /admin/ {
        proxy_set_header Host $host;
        proxy_pass http://backend:8000;
    }

    # Статика Django (админка и rest_framework)
    # Эти папки точно лежат в /var/html/static/
    location /static/admin/ {
        root /var/html/;
    }

    location /static/rest_framework/ {
        root /var/html/;
    }

    # Статика Фронтенда (React: JS, CSS)
    # Эти файлы лежат в /usr/share/nginx/html/static/
    location /static/ {
        root /usr/share/nginx/html/;
    }

    # Медиа-файлы (аватарки, картинки рецептов)
    location /media/ {
        root /var/html/;
    }

    # Фронтенд — всё остальное
    location / {
        root /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /var/html/frontend/;
    }
}