version: '3.8'

services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env

  backend:
    image: venius24/foodgram_backend:latest
    restart: always
    depends_on:
      - db
    env_file: .env
    volumes:
      - static_value:/app/static/
      - media_value:/app/media/

  frontend:
    image: venius24/foodgram_frontend:latest
    restart: always
    volumes:
      - frontend_static:/static/ # Путь внутри контейнера, где лежит билд

  nginx:
    image: nginx:1.19.3
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - frontend_static:/usr/share/nginx/html/
      - static_value:/var/html/static/
      - media_value:/var/html/media/
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  static_value:
  media_value:
  frontend_static:
